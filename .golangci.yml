version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - goconst
    - gocyclo
    - misspell
    - unconvert
    - unparam
    - depguard
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocyclo:
      min-complexity: 15
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: false
        - name: package-comments
          disabled: false
    depguard:
      rules:
        domain-no-other-internal:
          files:
            - "**/internal/domain/**/*.go"
          deny:
            - pkg: "vitals/internal/ports"
              desc: "domain must not import ports"
            - pkg: "vitals/internal/app"
              desc: "domain must not import the app layer"
            - pkg: "vitals/internal/adapters"
              desc: "domain must not import adapter implementations"

        ports-no-impl:
          files:
            - "**/internal/ports/**/*.go"
          deny:
            - pkg: "vitals/internal/app"
              desc: "ports must not import app layer"
            - pkg: "vitals/internal/adapters"
              desc: "ports must not import adapters"

        app-no-adapters:
          files:
            - "**/internal/app/**/*.go"
          deny:
            - pkg: "vitals/internal/adapters"
              desc: "app layer must not import adapter implementations"

        adapters-no-app:
          files:
            - "**/internal/adapters/**/*.go"
          deny:
            - pkg: "vitals/internal/app"
              desc: "adapters must depend on inbound port interfaces, not the app layer directly"

formatters:
  enable:
    - gofmt
    - goimports
